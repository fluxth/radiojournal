name: Deploy release

on:
  release:
    types: [published]

jobs:
  check-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
    outputs:
      lambda-run-id: ${{ steps.check.outputs.lambda-run-id }}
      frontend-run-id: ${{ steps.check.outputs.frontend-run-id }}
    steps:
      - name: Check for existing build artifacts
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find_artifact_run() {
            local workflow=$1 artifact=$2 run_id count

            run_id=$(gh api \
              "repos/$GITHUB_REPOSITORY/actions/workflows/$workflow/runs?head_sha=$GITHUB_SHA&status=success&per_page=1" \
              --jq '.workflow_runs[0].id // ""' 2>/dev/null) || return 0
            [[ -z $run_id ]] && return 0

            count=$(gh api \
              "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/artifacts?name=$artifact" \
              --jq '.total_count' 2>/dev/null) || return 0
            [[ ${count:-0} -gt 0 ]] && echo "$run_id"
          }

          lambda_run=$(find_artifact_run "build-lambda.yml" "lambda")
          frontend_run=$(find_artifact_run "build-frontend.yml" "frontend")

          if [[ -n $lambda_run ]]; then
            echo "Lambda build found: run_id=$lambda_run"
            echo "lambda-run-id=$lambda_run" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n $frontend_run ]]; then
            echo "Frontend build found: run_id=$frontend_run"
            echo "frontend-run-id=$frontend_run" >> "$GITHUB_OUTPUT"
          fi

  build-frontend:
    needs: check-artifacts
    if: needs.check-artifacts.outputs.frontend-run-id == ''
    uses: ./.github/workflows/build-frontend.yml

  build-lambda:
    needs: check-artifacts
    if: needs.check-artifacts.outputs.lambda-run-id == ''
    uses: ./.github/workflows/build-lambda.yml

  deploy-api-frontend:
    needs: [check-artifacts, build-lambda, build-frontend]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Download lambda artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lambda
          path: target/lambda
          run-id: ${{ needs.check-artifacts.outputs.lambda-run-id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download frontend artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend
          path: frontend/build
          run-id: ${{ needs.check-artifacts.outputs.frontend-run-id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy frontend
        env:
          FRONTEND_BUCKET: ${{ vars.FRONTEND_BUCKET }}
        run: |
          echo "Syncing immutable assets..."
          aws s3 sync frontend/build/_app/immutable/ "s3://$FRONTEND_BUCKET/_app/immutable/" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

          echo "Syncing remaining files..."
          aws s3 sync frontend/build/ "s3://$FRONTEND_BUCKET/" \
            --exclude "_app/immutable/*" \
            --cache-control "no-cache, must-revalidate" \
            --delete

      - name: Deploy API lambda
        run: |
          cd target/lambda/radiojournal-api
          zip bootstrap.zip bootstrap

          echo "Uploading code..."
          aws lambda update-function-code \
            --function-name ${{ vars.API_FUNCTION_NAME }} \
            --zip-file fileb://bootstrap.zip \
            > /dev/null

          echo "Waiting for update..."
          aws lambda wait function-updated-v2 \
            --function-name ${{ vars.API_FUNCTION_NAME }}

          echo "Publishing version..."
          VERSION=$(aws lambda publish-version \
            --function-name ${{ vars.API_FUNCTION_NAME }} \
            --description "${{ github.ref_name }}" \
            --query 'Version' --output text)

          echo "Promoting alias to version $VERSION..."
          aws lambda update-alias \
            --function-name ${{ vars.API_FUNCTION_NAME }} \
            --name live \
            --function-version "$VERSION" \
            > /dev/null

      - name: Sanity check - station list
        run: |
          STATIONS=$(curl -sf "${{ vars.API_BASE_URL }}/v1/stations")
          echo "$STATIONS" | jq -e 'length > 0'
          echo "STATION_ID=$(echo "$STATIONS" | jq -r '.[0].id')" >> "$GITHUB_ENV"

      - name: Sanity check - station tracks
        run: curl -sf "${{ vars.API_BASE_URL }}/v1/station/$STATION_ID/tracks" | jq -e '.'

      - name: Sanity check - station plays
        run: |
          END=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          START=$(date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%SZ)
          curl -sf "${{ vars.API_BASE_URL }}/v1/station/$STATION_ID/plays?start=$START&end=$END" | jq -e '.'

  deploy-logger:
    needs: [check-artifacts, deploy-api-frontend]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Download lambda artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lambda
          path: target/lambda
          run-id: ${{ needs.check-artifacts.outputs.lambda-run-id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy logger lambda
        run: |
          cd target/lambda/radiojournal-logger
          zip bootstrap.zip bootstrap

          echo "Uploading code..."
          aws lambda update-function-code \
            --function-name ${{ vars.LOGGER_FUNCTION_NAME }} \
            --zip-file fileb://bootstrap.zip \
            > /dev/null

          echo "Waiting for update..."
          aws lambda wait function-updated-v2 \
            --function-name ${{ vars.LOGGER_FUNCTION_NAME }}

          echo "Publishing version..."
          VERSION=$(aws lambda publish-version \
            --function-name ${{ vars.LOGGER_FUNCTION_NAME }} \
            --description "${{ github.ref_name }}" \
            --query 'Version' --output text)

          echo "Testing version $VERSION before promoting..."
          RESULT=$(aws lambda invoke \
            --function-name "${{ vars.LOGGER_FUNCTION_NAME }}:$VERSION" \
            --cli-binary-format raw-in-base64-out \
            /tmp/logger-precheck.json)
          echo "$RESULT" | jq -e 'has("FunctionError") | not'

          echo "Promoting alias to version $VERSION..."
          aws lambda update-alias \
            --function-name ${{ vars.LOGGER_FUNCTION_NAME }} \
            --name live \
            --function-version "$VERSION" \
            > /dev/null

      - name: Sanity check - logger invoke
        run: |
          RESULT=$(aws lambda invoke \
            --function-name ${{ vars.LOGGER_FUNCTION_NAME }}:live \
            --cli-binary-format raw-in-base64-out \
            /tmp/logger-response.json)
          echo "$RESULT"
          echo "$RESULT" | jq -e 'has("FunctionError") | not'
