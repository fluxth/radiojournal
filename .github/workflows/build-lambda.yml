name: Build radiojournal lambda

on:
  pull_request:
  push:
    branches:
      - "main"
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # renovate: datasource=pypi depName=cargo-lambda
      CARGO_LAMBDA_VERSION: "1.9.1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install rust toolchain
        run: |
          cargo version
          rustup target add aarch64-unknown-linux-gnu

      - name: Cache rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: build
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Setup python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version-file: ".python-version"
          cache: "pip"

      - name: Install cargo lambda
        run: pip3 install cargo-lambda==${{ env.CARGO_LAMBDA_VERSION }}

      - name: Build lambdas
        run: cargo lambda build --release --arm64 --locked --bin radiojournal-logger --bin radiojournal-api

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_call' }}
        with:
          name: lambda
          path: target/lambda
          include-hidden-files: true
          retention-days: 3
